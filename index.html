<script>
  document.getElementById("btn").addEventListener("click", function () {

    alert("Clique detectado ✅");

    fetch("/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: "teste" })
    })
    .then(function (res) {
      alert("Status: " + res.status);
      return res.text();
    })
    .then(function (text) {
      alert(text);
    })
    .catch(function (err) {
      alert("Erro: " + err);
    });

  });
</script>
