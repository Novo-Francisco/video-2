<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Vídeo com Fotos (IA)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Gerador de Vídeo com Fotos</h1>

  <p>Envie várias fotos para criar um vídeo animado.</p>

  <input type="file" id="images" multiple accept="image/*">

  <button id="generate">Gerar Vídeo</button>

  <div id="status"></div>

  <video id="result" controls></video>

  <script src="app.js"></script>
</body>
</html>
