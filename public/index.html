<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vídeo com Texto + Fotos (IA)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Gerador de Vídeo com Texto + Fotos</h1>

  <p>Digite o texto da história e envie várias fotos como cenas.</p>

  <textarea id="prompt" placeholder="Digite aqui o texto do vídeo..."></textarea>

  <input type="file" id="images" multiple accept="image/*">

  <button id="generate">Gerar Vídeo</button>

  <div id="status"></div>

  <video id="result" controls></video>

  <script src="app.js"></script>
</body>
</html>
